<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopHub - Electronics</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- HEADER (same as main) -->
<header class="app-header">
  <div class="container header-container">
    <img src="Assets/Login/7/Company Logo.svg" class="header-logo">

    <nav class="main-nav">
      <a href="MenClothing.html">Men</a>
      <a href="WomenClothing.html">Women</a>
      <a href="KidsClothing.html">Kids</a>
    </nav>

    <div class="header-actions">
      <a href="cart.html">🛒 <span id="nav-cart-count">0</span></a>
      <a href="#" class="btn-primary">Logout</a>
    </div>
  </div>
</header>

<!-- TITLE -->
<section class="category-page-header">
  <h1>Electronics</h1>
  <p>Premium gadgets</p>
</section>

<!-- PRODUCTS -->
<main class="container">
  <div class="products-grid">

    <!-- PRODUCT -->
    <div class="product-card" data-id="1" data-price="2000">
      <h3>Headphones</h3>
      <p>Noise cancelling</p>
      <span>DA2000</span>

      <input type="number" value="1" min="1">
      <button onclick="handleAddToCart(this)">
        <i class="fa fa-cart-plus"></i>
      </button>
    </div>

    <!-- PRODUCT -->
    <div class="product-card" data-id="2" data-price="8490">
      <h3>Smart Watch</h3>
      <p>Health tracking</p>
      <span>DA8490</span>

      <input type="number" value="1" min="1">
      <button onclick="handleAddToCart(this)">
        <i class="fa fa-cart-plus"></i>
      </button>
    </div>

    <!-- PRODUCT -->
    <div class="product-card" data-id="3" data-price="850">
      <h3>Speaker</h3>
      <p>Bluetooth portable</p>
      <span>DA850</span>

      <input type="number" value="1" min="1">
      <button onclick="handleAddToCart(this)">
        <i class="fa fa-cart-plus"></i>
      </button>
    </div>

  </div>
</main>

<!-- FOOTER (simplified same style) -->
<footer class="custom-footer">
  <p>© 2026 ShopHub</p>
</footer>

<script src="script.js"></script>
</body>
</html>
