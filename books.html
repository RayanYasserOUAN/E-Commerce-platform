<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexShop — Books</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <span class="header-title">NexShop</span>
    <nav class="site-nav">
      <a href="main.html"><i class="fa fa-house"></i></a>
      <a href="electronics.html"><i class="fa fa-microchip"></i></a>
      <a href="clothing.html"><i class="fa fa-shirt"></i></a>
      <a href="books.html" class="active"><i class="fa fa-book"></i></a>
      <a href="#"><i class="fa fa-cart-shopping"></i></a>
    </nav>
  </div>
</header>

<!-- TITLE -->
<section class="category-page-header">
  <h1>Books</h1>
  <p>Knowledge that powers your career</p>
</section>

<!-- PRODUCTS -->
<main class="products-main">
  <div class="products-grid">

    <!-- BOOK -->
    <div class="product-card" data-id="7" data-price="1500">
      <h3>Python Programming</h3>
      <p>Guide complet Python (débutant → avancé)</p>
      <span>DA1500</span>

      <div class="product-actions">
        <input type="number" value="1" min="1">
        <button onclick="handleAddToCart(this)">
          <i class="fa fa-cart-plus"></i>
        </button>
      </div>
    </div>

    <!-- BOOK -->
    <div class="product-card" data-id="8" data-price="1200">
      <h3>Design Patterns</h3>
      <p>Les 23 design patterns essentiels</p>
      <span>DA1200</span>

      <div class="product-actions">
        <input type="number" value="1" min="1">
        <button onclick="handleAddToCart(this)">
          <i class="fa fa-cart-plus"></i>
        </button>
      </div>
    </div>

    <!-- BOOK -->
    <div class="product-card" data-id="9" data-price="1350">
      <h3>Pragmatic Programmer</h3>
      <p>Conseils pratiques pour développeurs</p>
      <span>DA1350</span>

      <div class="product-actions">
        <input type="number" value="1" min="1">
        <button onclick="handleAddToCart(this)">
          <i class="fa fa-cart-plus"></i>
        </button>
      </div>
    </div>

  </div>
</main>

<!-- FOOTER -->
<footer class="site-footer">
  <p>© 2026 NexShop</p>
</footer>

<script src="script.js"></script>
</body>
</html>
